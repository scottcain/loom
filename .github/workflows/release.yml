name: release

# Triggered by pushing a tag matching v* (e.g. v0.1.0-alpha.1), or manually
# via workflow_dispatch (handy for re-running on the same tag without
# inventing a new one).
# Builds platform-specific Orbit installers and attaches them to a draft
# GitHub Release. Promote the draft to a published release manually.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest runners are arm64 (Apple Silicon).
          - os: macos-latest
            arch: arm64
            platform: darwin
          # macos-13 runners are the last x64 Intel macs in GitHub's fleet.
          - os: macos-13
            arch: x64
            platform: darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Make Orbit (${{ matrix.platform }}-${{ matrix.arch }})
        working-directory: app
        run: npx electron-forge make --arch=${{ matrix.arch }} --platform=${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbit-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            app/out/make/**/*.dmg
            app/out/make/**/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: find artifacts -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
          fail_on_unmatched_files: true
